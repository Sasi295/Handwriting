<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>To‑Do List</h1>

    <form id="todo-form" class="todo-form" aria-label="Add new todo">
      <input id="todo-input" type="text" placeholder="What needs to be done?" aria-label="New todo" required />
      <button type="submit">Add</button>
    </form>

    <div class="controls">
      <div class="filters" role="tablist" aria-label="Filter todos">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="completed">Completed</button>
      </div>
      <button id="clear-completed" class="small">Clear completed</button>
    </div>

    <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

    <footer class="footer">
      <span id="items-left">0 items left</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
